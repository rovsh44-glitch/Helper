route:
  receiver: default
  routes:
    - matchers:
        - severity="p1"
      receiver: helper-oncall-p1
      continue: false
    - matchers:
        - severity="p2"
      receiver: helper-team-p2
      continue: true

receivers:
  - name: default
  - name: helper-oncall-p1
    webhook_configs:
      - url: https://alerts.example.internal/helper/p1
  - name: helper-team-p2
    webhook_configs:
      - url: https://alerts.example.internal/helper/p2
