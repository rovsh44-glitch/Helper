services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: helper-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - "D:/HELPER_DATA/Qdrant:/qdrant/storage"
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  searxng:
    image: searxng/searxng:2025.8.1-3d96414
    container_name: helper-searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

