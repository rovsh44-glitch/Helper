name: runtime-test-lanes

on:
  workflow_dispatch:
    inputs:
      run_integration:
        description: Run the integration lane in addition to fast
        required: false
        default: true
        type: boolean
      run_certification:
        description: Run the certification lane
        required: false
        default: false
        type: boolean
      run_certification_compile:
        description: Run the certification compile lane
        required: false
        default: false
        type: boolean
      run_eval:
        description: Run the eval lane
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: runtime-test-lanes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore solution
        shell: pwsh
        run: dotnet restore Helper.sln
      - name: Run fast lane
        shell: pwsh
        run: ./scripts/run_fast_tests.ps1 -Configuration Debug -NoRestore

  integration:
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration
    runs-on: windows-latest
    needs: fast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore solution
        shell: pwsh
        run: dotnet restore Helper.sln
      - name: Run integration lane
        shell: pwsh
        run: ./scripts/run_integration_tests.ps1 -Configuration Debug -NoRestore

  eval:
    if: github.event_name == 'workflow_dispatch' && inputs.run_eval
    runs-on: windows-latest
    needs: fast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore solution
        shell: pwsh
        run: dotnet restore Helper.sln
      - name: Run eval lane
        shell: pwsh
        run: ./scripts/run_eval_harness_tests.ps1 -Configuration Debug -NoRestore

  certification:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_certification)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore solution
        shell: pwsh
        run: dotnet restore Helper.sln
      - name: Run certification lane
        shell: pwsh
        run: ./scripts/run_certification_tests.ps1 -Configuration Debug -NoRestore

  certification_compile:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_certification_compile)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore solution
        shell: pwsh
        run: dotnet restore Helper.sln
      - name: Run certification compile lane
        shell: pwsh
        run: ./scripts/run_certification_compile_tests.ps1 -Configuration Debug -NoRestore
      - name: Upload certification compile diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: certification-compile-diagnostics-${{ github.run_id }}
          path: |
            test/Helper.Runtime.Certification.Compile.Tests/bin/Debug/runs/**
          if-no-files-found: warn
          retention-days: 14
