name: nuget-security-audit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nuget-security-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  connected_nuget_audit:
    runs-on: windows-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run NuGet security gate
        shell: pwsh
        run: |
          Remove-Item Env:ALL_PROXY,Env:HTTP_PROXY,Env:HTTPS_PROXY,Env:GIT_HTTP_PROXY,Env:GIT_HTTPS_PROXY -ErrorAction SilentlyContinue
          ./scripts/nuget_security_gate.ps1 -ExecutionMode strict-online -ClearProxyEnvironment -ReportPath temp/verification/nuget_security_gate_report.json

      - name: Publish NuGet audit summary
        if: always()
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "temp/verification/nuget_security_gate_report.json")) {
            throw "NuGet audit report was not produced."
          }
          $report = Get-Content "temp/verification/nuget_security_gate_report.json" -Raw | ConvertFrom-Json
          @"
          ## NuGet Security Audit
          - Status: `$($report.status)
          - Execution mode: `$($report.executionMode)
          - Required status context: `connected_nuget_audit`
          - Protected branch target: `main`
          - Audit warning codes: `$((@($report.auditWarningCodes) -join ', '))
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload NuGet security gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-security-gate-report
          path: temp/verification/nuget_security_gate_report.json
          if-no-files-found: error
