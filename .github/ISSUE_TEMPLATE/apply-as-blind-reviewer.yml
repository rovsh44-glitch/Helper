name: Apply as blind reviewer
description: Volunteer for blinded evaluation review once the public program is open.
title: "[Reviewer] "
labels:
  - reviewer-intake
body:
  - type: markdown
    attributes:
      value: |
        Use this form only if you want to participate in a future blinded review program.

        Do not include credentials, private documents, or unnecessary personal data.
  - type: input
    id: public_handle
    attributes:
      label: Public handle
      description: GitHub handle or other public-facing name.
      placeholder: rovsh44
    validations:
      required: true
  - type: input
    id: contact_email
    attributes:
      label: Contact email
      description: Address suitable for reviewer coordination.
      placeholder: name@example.com
    validations:
      required: true
  - type: textarea
    id: languages
    attributes:
      label: Working languages
      description: List the languages you can review confidently.
      placeholder: English, Russian
    validations:
      required: true
  - type: textarea
    id: domain_familiarity
    attributes:
      label: Domain familiarity
      description: List domains you can review well.
      placeholder: Software, education, finance
    validations:
      required: true
  - type: input
    id: timezone
    attributes:
      label: Timezone
      description: Example: UTC+05:00
      placeholder: UTC+05:00
    validations:
      required: true
  - type: textarea
    id: conflicts
    attributes:
      label: Conflicts of interest
      description: State any relationship that could affect reviewer independence.
      placeholder: None
    validations:
      required: true
  - type: checkboxes
    id: reviewer_commitments
    attributes:
      label: Reviewer commitments
      options:
        - label: I can review blinded response pairs without requesting hidden labels.
          required: true
        - label: I will not publish active review materials during a blind round.
          required: true
  - type: textarea
    id: availability
    attributes:
      label: Availability
      description: Describe when you could participate in a review window.
      placeholder: Weekday evenings, weekends
    validations:
      required: true
