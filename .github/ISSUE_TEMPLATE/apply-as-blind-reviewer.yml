name: Apply as blind reviewer
description: Volunteer for blinded evaluation review once the public program is open.
body:
  - type: markdown
    attributes:
      value: |
        Use this form only if you want to participate in a future blinded review program.
  - type: input
    id: public_handle
    attributes:
      label: Public handle
      placeholder: rovsh44
    validations:
      required: true
  - type: textarea
    id: languages
    attributes:
      label: Working languages
      placeholder: English, Russian
    validations:
      required: true
  - type: textarea
    id: availability
    attributes:
      label: Availability
      placeholder: Weekday evenings, weekends
    validations:
      required: true
